<!DOCTYPE html>

        <div class="slider">
            <button class="prev" onclick="changeSlide(-1)">❮</button>

                <img src="images/unnamed.jpg" class="slide active">
                <img src="images/IMG_1314.jpeg" class="slide">
                <img src="images/IMG_1316.jpeg" class="slide">
                <img src="images/IMG_1663.jpeg" class="slide">
                <img src="images/IMG_1664.jpeg" class="slide">
                <img src="images/IMG_1665.jpeg" class="slide">
                <img src="images/IMG_1666.jpeg" class="slide">
            </div>

            <button class="next" onclick="changeSlide(1)">❯</button>
        </div>

        <!-- TEXT INFO -->
        <div class="car-info">
            <h2>2018 Toyota Highlander</h2>
            <p><strong>Service:</strong> Full Interior Detail</p>
            <p>
                Interior Vaccum & Spray/Wipe Down.
            </p>
